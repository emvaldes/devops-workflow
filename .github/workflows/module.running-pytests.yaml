---
## File: .github/workflows/module.running-pytests.yaml
## Version: 0.2.2

name: Running PyTests Test Modules
on:

  workflow_call:

    inputs:

      test_functions:
        required: true
        type: string

    outputs:
      pytest_modules:
        description: "List of pytest modules extracted"
        value: ${{ jobs.test-functions.outputs.pytest_modules }}

jobs:

      test-functions:
    runs-on: ubuntu-latest
    outputs:
      pytest_modules: ${{ steps.extract_modules.outputs.modules }}
    steps:

      - name: Check PyTest Functions
        id: test_functions
        run: |
          if [[ -z '${{ inputs.test_functions }}' ]]; then
            echo -en "Error: inputs.test_functions must be provided. " ;
            echo -e  "The workflow cannot proceed without valid Test Functions." ;
            exit 1 ;
          fi ;

      - name: Extract Pytest Module Names
        id: extract_modules
        run: |
          echo '${{ inputs.test_functions }}' | jq -c '.test_functions | keys' > pytest_modules.json
          echo "modules=$(cat pytest_modules.json)" >> $GITHUB_OUTPUT

      - name: Debug - Extracted Pytest Modules
        run: |
          echo "Extracted Pytest Modules: ${{ steps.extract_modules.outputs.modules }}"

  running-pytests:
    needs: test-functions
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJson(vars.PYTHON_VERSIONS).python }}
        pytest_module: ${{ fromJson(needs.test-functions.outputs.pytest_modules) }}
    steps:

      - name: Install System Packages
        run: |
          sudo apt-get update --yes ;
          sudo apt-get install tree jq --yes ;

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Python and Dependencies
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Restore Cached Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ matrix.python-version }}-

      - name: Download requirements.txt
        uses: actions/download-artifact@v4
        with:
          name: requirements-${{ matrix.python-version }}
          path: .

      - name: Verify requirements.txt Exists
        run: |
          if [[ ! -f requirements.txt ]]; then
            echo -e "ERROR: requirements.txt is missing!" ;
            exit 1 ;
          fi ;
          echo -e "requirements.txt found!" ;
          cat requirements.txt ;

      - name: Reinstall Dependencies from Cache
        run: |
          python -m pip install --upgrade pip ;
          python -m pip install -r requirements.txt ;

      - name: Run Pytest for Entire Module
        run: |
          pytest -v --junitxml=pytest-results.xml \
          "${{ matrix.pytest_module }}" ;

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.python-version }}-${{ matrix.pytest_module }}
          path: pytest-results.xml
